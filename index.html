<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐕 Дрессировка собаки — мобильная версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2b5e3b 0%, #4c9f70 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 30%, rgba(255,240,150,0.2) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .game-container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 20px 15px;
            box-shadow: 0 30px 50px rgba(0, 20, 0, 0.6), inset 0 0 30px rgba(255, 255, 200, 0.3);
            border: 2px solid rgba(255, 215, 0, 0.5);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            color: #fef7d2;
            text-shadow: 3px 3px 0 #3e6b2e, 6px 6px 0 #1e3b15;
            letter-spacing: 2px;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .score-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 250, 210, 0.7);
            backdrop-filter: blur(4px);
            padding: 12px 15px;
            border-radius: 40px;
            border: 3px solid #ffbf00;
            margin-bottom: 20px;
            box-shadow: 0 8px 0 #9b6b00;
        }

        .score-badge {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 40px;
            background: white;
            box-shadow: inset 0 -4px 0 #c0c0c0;
        }

        .positive {
            background: #d0ffb0;
            color: #1d6300;
            border: 3px solid #3fa30b;
        }

        .negative {
            background: #ffc0c0;
            color: #a10000;
            border: 3px solid #ff4d4d;
        }

        .commands {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0 15px;
        }

        .cmd-btn {
            background: linear-gradient(145deg, #feda75, #ffb347);
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #2d5016;
            text-shadow: 1px 1px 0 #ffe19e;
            cursor: pointer;
            border: 4px solid #ca9629;
            box-shadow: 0 8px 0 #9e701c, 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.07s linear;
            min-width: 140px;
            letter-spacing: 1px;
        }

        .cmd-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #9e701c, 0 5px 15px rgba(0,0,0,0.3);
        }

        .cmd-btn:disabled {
            opacity: 0.5;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #9e701c;
            cursor: not-allowed;
        }

        .sprite-area {
            background: rgba(90, 130, 70, 0.7);
            backdrop-filter: blur(6px);
            border-radius: 50px;
            padding: 15px;
            margin: 15px 0;
            border: 4px solid #f0d060;
            min-height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 -8px 0 #467a34, 0 15px 25px rgba(0,0,0,0.4);
        }

        .sprite-display {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .sprite-box {
            background: #c8e6b0;
            border-radius: 40px;
            padding: 10px;
            border: 5px solid #5f964c;
            box-shadow: 0 8px 0 #36632a;
        }

        .sprite-img, .sprite-video {
            max-width: 200px;
            max-height: 140px;
            border-radius: 30px;
            object-fit: contain;
        }

        /* Контейнер для погони */
        .chase-container {
            width: 100%;
            height: 130px;
            background: #7da064;
            border-radius: 60px;
            position: relative;
            overflow: hidden;
            border: 5px solid #c9a24b;
            box-shadow: inset 0 0 0 3px #eac784;
        }

        .runner {
            position: absolute;
            height: 90px;
            width: auto;
            transition: left 0.05s linear;
            will-change: left;
            filter: drop-shadow(5px 8px 5px rgba(0,0,0,0.4));
        }

        .timer-box {
            font-size: 2rem;
            text-align: center;
            background: #fee48e;
            padding: 10px;
            border-radius: 50px;
            border: 5px solid #cb8b2c;
            margin: 10px 0;
            color: #3f2c0b;
            font-weight: bold;
            text-shadow: 2px 2px 0 #ffc36b;
            box-shadow: 0 6px 0 #a66d1c;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }

        .action-btn {
            background: radial-gradient(circle at 30% 20%, #fff0b5, #fdcd6d);
            border: none;
            font-size: 1.6rem;
            padding: 12px 25px;
            border-radius: 50px;
            border: 5px solid #dc9e2b;
            box-shadow: 0 8px 0 #b0761a, 0 5px 15px black;
            cursor: pointer;
            font-weight: bold;
            color: #2d4a1a;
            transition: 0.07s linear;
        }

        .action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #b0761a, 0 5px 15px black;
        }

        .action-btn:disabled {
            opacity: 0.5;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b0761a;
            pointer-events: none;
        }

        .message-area {
            font-size: 1.4rem;
            text-align: center;
            background: rgba(255, 250, 200, 0.9);
            backdrop-filter: blur(4px);
            padding: 15px;
            border-radius: 50px;
            margin: 15px 0;
            border: 4px dashed #e5a43b;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2a521a;
            font-weight: bold;
            box-shadow: inset 0 -4px 0 #c0a05a;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            background: #b8f0b0;
            border: none;
            font-size: 1.4rem;
            padding: 10px 20px;
            border-radius: 50px;
            border: 4px solid #5f9e4a;
            box-shadow: 0 6px 0 #3f782c;
            cursor: pointer;
            font-weight: bold;
            color: #1b4f0b;
            transition: 0.05s linear;
        }

        .ctrl-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #3f782c;
        }

        footer {
            text-align: center;
            margin-top: 15px;
            color: #e9ffd4;
            font-size: 1.2rem;
            text-shadow: 2px 2px 0 #4a6b32;
        }

        /* Медиа-запрос для очень маленьких экранов */
        @media (max-width: 500px) {
            h1 {
                font-size: 2rem;
                text-shadow: 2px 2px 0 #3e6b2e, 4px 4px 0 #1e3b15;
            }
            .score-badge {
                font-size: 1.2rem;
                padding: 4px 12px;
            }
            .cmd-btn {
                font-size: 1.2rem;
                padding: 10px 12px;
                min-width: 110px;
            }
            .action-btn {
                font-size: 1.3rem;
                padding: 10px 15px;
            }
            .action-buttons {
                gap: 10px;
                flex-direction: column;
                align-items: center;
            }
            .action-btn {
                width: 80%;
            }
            .control-buttons .ctrl-btn {
                font-size: 1.2rem;
                padding: 8px 12px;
            }
            .sprite-area {
                min-height: 150px;
                padding: 10px;
            }
            .sprite-img, .sprite-video {
                max-width: 160px;
                max-height: 120px;
            }
            .chase-container {
                height: 100px;
            }
            .runner {
                height: 70px;
            }
            .timer-box {
                font-size: 1.6rem;
                padding: 8px;
            }
            .message-area {
                font-size: 1.2rem;
                padding: 10px;
                min-height: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐩 ДРЕССИРОВКА 🐕</h1>

        <!-- Счётчики -->
        <div class="score-panel">
            <span class="score-badge positive" id="positiveScore">😊 +0</span>
            <span class="score-badge negative" id="negativeScore">😢 -0</span>
        </div>

        <!-- Кнопки команд -->
        <div class="commands" id="commandButtons">
            <button class="cmd-btn" id="cmdSit">🪑 СИДЕТЬ</button>
            <button class="cmd-btn" id="cmdLie">🛌 ЛЕЖАТЬ</button>
            <button class="cmd-btn" id="cmdStand">🧍 СТОЯТЬ</button>
        </div>

        <!-- Область спрайтов/видео -->
        <div class="sprite-area" id="spriteArea">
            <div class="sprite-display" id="spriteDisplay">
                <!-- Сюда будут подгружаться картинки и видео -->
            </div>
        </div>

        <!-- Таймер -->
        <div id="timerDisplay" class="timer-box">⏳ 3</div>

        <!-- Кнопки похвалить/наказать -->
        <div class="action-buttons" id="actionButtons">
            <button class="action-btn" id="praiseBtn">👍 ПОХВАЛИТЬ</button>
            <button class="action-btn" id="punishBtn">👎 НАКАЗАТЬ</button>
        </div>

        <!-- Сообщения -->
        <div id="messageArea" class="message-area">👋 Нажми СТАРТ, чтобы начать тренировку</div>

        <!-- Управление -->
        <div class="control-buttons">
            <button class="ctrl-btn" id="startBtn">▶ СТАРТ</button>
            <button class="ctrl-btn" id="resetBtn">🔄 ЗАНОВО</button>
            <button class="ctrl-btn" id="endBtn">⏹ ЗАКОНЧИТЬ</button>
        </div>

        <footer>🐾 Тренируй с любовью, и собака ответит тем же</footer>
    </div>

    <script>
        // Полностью сохранён исходный JavaScript (без изменений)
        (function() {
            // --- ВСЕ ССЫЛКИ НА СПРАЙТЫ И ВИДЕО (рабочие) ---
            const SPRITES = {
                stand: 'https://scozelenenie.ru/wp-content/uploads/2026/03/i-31.webp',        // собака стоит
                lie: 'https://scozelenenie.ru/wp-content/uploads/2026/03/i-30.webp',          // собака лежит
                sit: 'https://scozelenenie.ru/wp-content/uploads/2026/03/th.jpg',             // собака сидит
                run: 'https://scozelenenie.ru/wp-content/uploads/2026/03/f90022abf4d450695693e2bb6a97cd47.gif', // бежит
                intruderRun: 'https://scozelenenie.ru/wp-content/uploads/2026/03/18f566fa5cf046c1e81fc6c61ce5dc53.gif', // нарушитель бежит
                intruderStatic: 'https://scozelenenie.ru/wp-content/uploads/2026/03/5636861914_455224387f_b.jpg', // нарушитель статичный
                tiredHappy: 'https://scozelenenie.ru/wp-content/uploads/2026/03/15c144e8dc552a100b3292d268854499.gif', // устал, но доволен
                videoHappy: 'https://scozelenenie.ru/wp-content/uploads/2026/03/12433583114824.mp4',        // видео радости
                videoCry: 'https://scozelenenie.ru/wp-content/uploads/2026/03/1.mp4' // видео плача
            };

            // --- Элементы DOM ---
            const positiveSpan = document.getElementById('positiveScore');
            const negativeSpan = document.getElementById('negativeScore');
            const cmdSit = document.getElementById('cmdSit');
            const cmdLie = document.getElementById('cmdLie');
            const cmdStand = document.getElementById('cmdStand');
            const commandDiv = document.getElementById('commandButtons');
            const spriteDisplay = document.getElementById('spriteDisplay');
            const timerDisplay = document.getElementById('timerDisplay');
            const praiseBtn = document.getElementById('praiseBtn');
            const punishBtn = document.getElementById('punishBtn');
            const messageArea = document.getElementById('messageArea');
            const startBtn = document.getElementById('startBtn');
            const resetBtn = document.getElementById('resetBtn');
            const endBtn = document.getElementById('endBtn');

            // --- Переменные состояния ---
            let positive = 0;
            let negative = 0;
            let totalTrainings = 0;          // счётчик тренировок (макс 21)
            let gameActive = false;           // активна ли игра
            let roundActive = false;          // идёт ли раунд (ожидание выбора)
            let currentCommand = null;        // 'sit', 'lie', 'stand', 'fas'
            let correctAction = null;         // правильное действие для текущего раунда: 'praise' или 'punish'
            let timerInterval = null;
            let reactionTimer = null;
            let timeLeft = 3;
            let intruderPresent = false;
            let chaseActive = false;

            // --- Обновление счётчиков ---
            function updateScores() {
                positiveSpan.innerText = `😊 +${positive}`;
                negativeSpan.innerText = `😢 -${negative}`;
            }

            // --- Блокировка кнопок команд ---
            function enableCommands(enable) {
                cmdSit.disabled = !enable;
                cmdLie.disabled = !enable;
                cmdStand.disabled = !enable;
            }

            // --- Блокировка кнопок действий (похвала/наказание) ---
            function enableActionButtons(enable) {
                praiseBtn.disabled = !enable;
                punishBtn.disabled = !enable;
            }

            // --- Остановка всех таймеров ---
            function clearAllTimers() {
                if (timerInterval) clearInterval(timerInterval);
                if (reactionTimer) clearTimeout(reactionTimer);
                timerInterval = null;
                reactionTimer = null;
            }

            // --- Отображение спрайта (по типу) ---
            function showSprite(type) {
                let src = '';
                if (type === 'sit') src = SPRITES.sit;
                else if (type === 'lie') src = SPRITES.lie;
                else if (type === 'stand') src = SPRITES.stand;
                else if (type === 'tired') src = SPRITES.tiredHappy;
                else if (type === 'intruder') src = SPRITES.intruderStatic;
                else return;

                spriteDisplay.innerHTML = `
                    <div class="sprite-box">
                        <img src="${src}" class="sprite-img" alt="${type}">
                    </div>
                `;
            }

            // --- Отображение видео ---
            function showVideo(type) {
                const src = type === 'praise' ? SPRITES.videoHappy : SPRITES.videoCry;
                spriteDisplay.innerHTML = `
                    <div class="sprite-box">
                        <video autoplay muted playsinline class="sprite-video">
                            <source src="${src}" type="video/mp4">
                        </video>
                    </div>
                `;
            }

            // --- Анимация погони ---
            function startChaseAnimation() {
                chaseActive = true;
                spriteDisplay.innerHTML = `
                    <div class="chase-container" id="chaseContainer">
                        <img src="${SPRITES.run}" class="runner" id="dogRunner" style="left: -150px; bottom: 10px;">
                        <img src="${SPRITES.intruderRun}" class="runner" id="intruderRunner" style="left: -250px; bottom: 10px;">
                    </div>
                `;

                let dogPos = -150;
                let intruderPos = -250;
                const chaseInterval = setInterval(() => {
                    if (!chaseActive) { clearInterval(chaseInterval); return; }
                    dogPos += 12;
                    intruderPos += 10; // собака быстрее
                    const dog = document.getElementById('dogRunner');
                    const intruder = document.getElementById('intruderRunner');
                    if (dog && intruder) {
                        dog.style.left = dogPos + 'px';
                        intruder.style.left = intruderPos + 'px';
                        // Когда оба скрылись за правым краем (ширина контейнера ~ 1100px)
                        if (dogPos > 1300) {
                            clearInterval(chaseInterval);
                            chaseActive = false;
                            // Показываем уставшую собаку
                            showSprite('tired');
                            messageArea.innerText = '🐕 Догнал нарушителя, но устал! Похвали?';
                            // Запускаем таймер на похвалу (3 сек)
                            startReactionTimer('praise'); // похвала - правильное действие
                        }
                    }
                }, 30);
            }

            // --- Запуск таймера на реакцию (3 сек) ---
            function startReactionTimer(correct) {
                correctAction = correct; // 'praise' или 'punish'
                timeLeft = 3;
                timerDisplay.innerText = `⏳ ${timeLeft}`;
                enableActionButtons(true);
                roundActive = true;

                timerInterval = setInterval(() => {
                    timeLeft--;
                    timerDisplay.innerText = `⏳ ${timeLeft}`;
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        if (roundActive) {
                            // Время вышло - засчитываем как отрицательное
                            negative++;
                            updateScores();
                            messageArea.innerText = '⏰ Время вышло! Отрицательное очко.';
                            roundActive = false;
                            enableActionButtons(false);
                            // Переходим к следующему раунду
                            scheduleNextRound();
                        }
                    }
                }, 1000);
            }

            // --- Обработка нажатия на похвалить/наказать ---
            function handleAction(action) {
                if (!roundActive || !gameActive) return;
                clearAllTimers();
                timerDisplay.innerText = '⏳ 3';
                enableActionButtons(false);
                roundActive = false;

                const isCorrect = (action === correctAction);
                if (isCorrect) {
                    positive++;
                    messageArea.innerText = '✅ Правильно! +1 положительное очко.';
                } else {
                    negative++;
                    messageArea.innerText = '❌ Неправильно! +1 отрицательное очко.';
                }
                // Показываем видео в зависимости от действия (а не от правильности)
                showVideo(action); // нажал похвалить - видео радости, нажал наказать - видео плача
                updateScores();
                totalTrainings++;

                if (totalTrainings >= 21) {
                    finishGame();
                } else {
                    // Следующий раунд через 2 сек
                    setTimeout(() => {
                        if (gameActive) nextRound();
                    }, 2000);
                }
            }

            // --- Завершение игры ---
            function finishGame() {
                gameActive = false;
                roundActive = false;
                enableCommands(false);
                enableActionButtons(false);
                clearAllTimers();
                document.getElementById('cmdFas')?.remove();

                let result = '';
                if (positive > negative * 5) {
                    result = '🏆 ПОБЕДА! Собака тренированная и счастливая! 🎉';
                    showSprite('tired');
                } else if (negative > positive) {
                    result = '😢 Собака подавлена. Нужно больше тренировок.';
                    showVideo('cry');
                } else {
                    result = '🤝 Ничья. Продолжайте заниматься!';
                    spriteDisplay.innerHTML = '';
                }
                messageArea.innerText = result;
            }

            // --- Планировщик следующего раунда ---
            function scheduleNextRound() {
                if (!gameActive) return;
                setTimeout(() => {
                    if (gameActive) nextRound();
                }, 1500);
            }

            // --- Новый раунд ---
            function nextRound() {
                if (!gameActive) return;
                // Убираем кнопку Фас, если осталась
                document.getElementById('cmdFas')?.remove();

                // С вероятностью 30% появляется нарушитель
                intruderPresent = Math.random() < 0.3;

                if (intruderPresent) {
                    // Показываем нарушителя и кнопку Фас
                    showSprite('intruder');
                    messageArea.innerText = '🚨 НАРУШИТЕЛЬ! Нажми ФАС! (3 сек)';
                    // Создаём кнопку Фас
                    const fasBtn = document.createElement('button');
                    fasBtn.id = 'cmdFas';
                    fasBtn.className = 'cmd-btn';
                    fasBtn.innerText = '🐕 ФАС!';
                    fasBtn.addEventListener('click', () => {
                        if (!gameActive || !intruderPresent) return;
                        // Успели нажать
                        clearAllTimers();
                        intruderPresent = false;
                        document.getElementById('cmdFas')?.remove();
                        messageArea.innerText = '🐕 СОБАКА ПОГНАЛАСЬ!';
                        positive++; // плюс за быструю реакцию
                        updateScores();
                        startChaseAnimation(); // запускаем погоню
                        // В этом случае totalTrainings увеличится после похвалы в конце погони
                    });
                    commandDiv.appendChild(fasBtn);
                    enableCommands(false);
                    // Запускаем таймер на нажатие Фас
                    startReactionTimerForFas();
                } else {
                    // Обычный раунд: показываем кнопки команд
                    enableCommands(true);
                    messageArea.innerText = 'Выбери команду для собаки';
                    spriteDisplay.innerHTML = ''; // очищаем
                }
            }

            // --- Специальный таймер для нажатия Фас (3 сек) ---
            function startReactionTimerForFas() {
                timeLeft = 3;
                timerDisplay.innerText = `⏳ ${timeLeft}`;
                roundActive = true; // чтобы не давать нажимать другие кнопки
                enableActionButtons(false); // похвала/наказание пока неактивны

                timerInterval = setInterval(() => {
                    timeLeft--;
                    timerDisplay.innerText = `⏳ ${timeLeft}`;
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        if (roundActive && intruderPresent) {
                            // Не нажали Фас вовремя
                            negative++;
                            updateScores();
                            messageArea.innerText = '😞 Нарушитель убежал. Отрицательное очко.';
                            intruderPresent = false;
                            document.getElementById('cmdFas')?.remove();
                            roundActive = false;
                            totalTrainings++;
                            if (totalTrainings >= 9) finishGame();
                            else scheduleNextRound();
                        }
                    }
                }, 1000);
            }

            // --- Сброс игры ---
            function resetGame() {
                clearAllTimers();
                gameActive = false;
                roundActive = false;
                chaseActive = false;
                positive = 0;
                negative = 0;
                totalTrainings = 0;
                updateScores();
                enableCommands(false);
                enableActionButtons(false);
                document.getElementById('cmdFas')?.remove();
                spriteDisplay.innerHTML = '';
                messageArea.innerText = '👋 Нажми СТАРТ, чтобы начать тренировку';
                timerDisplay.innerText = '⏳ 3';
            }

            // --- Старт игры ---
            function startGame() {
                if (gameActive) return;
                resetGame(); // очищаем всё
                gameActive = true;
                totalTrainings = 0;
                positive = 0; negative = 0;
                updateScores();
                nextRound();
            }

            // --- Принудительное завершение ---
            function endGame() {
                if (!gameActive) return;
                gameActive = false;
                roundActive = false;
                clearAllTimers();
                enableCommands(false);
                enableActionButtons(false);
                document.getElementById('cmdFas')?.remove();
                messageArea.innerText = 'Игра завершена. Нажми СТАРТ для новой игры.';
            }

            // --- Обработчики команд ---
            function handleCommand(command) {
                if (!gameActive || intruderPresent) return;
                // Генерируем правильность выполнения (90% правильно)
                const isCorrect = Math.random() < 0.9;
                // Показываем соответствующий спрайт (команда может не совпадать, но для демо показываем то, что выбрали)
                // Но чтобы было наглядно, если ошибка, можно показать другой спрайт? В задании: "изображение в хаотичном порядке"
                // Упростим: всегда показываем спрайт выбранной команды, но правильность определяется случайно.
                showSprite(command);
                const commandName = command === 'sit' ? 'сидеть' : command === 'lie' ? 'лежать' : 'стоять';
                if (isCorrect) {
                    messageArea.innerText = `🐕 Собака правильно выполнила команду "${commandName}"! Твоё действие?`;
                } else {
                    messageArea.innerText = `😕 Собака ошиблась (сделала не "${commandName}"). Твоё действие?`;
                }
                // Запускаем таймер на похвалу/наказание
                startReactionTimer(isCorrect ? 'praise' : 'punish');
                enableCommands(false);
            }

            cmdSit.addEventListener('click', () => handleCommand('sit'));
            cmdLie.addEventListener('click', () => handleCommand('lie'));
            cmdStand.addEventListener('click', () => handleCommand('stand'));

            praiseBtn.addEventListener('click', () => handleAction('praise'));
            punishBtn.addEventListener('click', () => handleAction('punish'));

            startBtn.addEventListener('click', startGame);
            resetBtn.addEventListener('click', resetGame);
            endBtn.addEventListener('click', endGame);

            // Начальное состояние
            enableCommands(false);
            enableActionButtons(false);
        })();
    </script>
</body>
</html>
